networks:
  xwiki-network:
    external: true
  traefik-network:
    external: true

volumes:
  xwiki-data:
  xwiki-postgres:
  xwiki-backups:
  traefik-certificates:

services:
  postgres:
    image: ${XWIKI_POSTGRES_IMAGE_TAG}
    volumes:
      - xwiki-postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${XWIKI_DB_NAME}
      POSTGRES_USER: ${XWIKI_DB_USER}
      POSTGRES_PASSWORD: ${XWIKI_DB_PASSWORD}
    networks:
      - xwiki-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "${XWIKI_DB_NAME}", "-U", "${XWIKI_DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  xwiki:
    image: ${XWIKI_IMAGE_TAG}
    volumes:
      - xwiki-data:${DATA_PATH}
    environment:
      DB_HOST: postgres
      DB_DATABASE: ${XWIKI_DB_NAME}
      DB_USER: ${XWIKI_DB_USER}
      DB_PASSWORD: ${XWIKI_DB_PASSWORD}
    networks:
      - xwiki-network
      - traefik-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    labels:
      # Enable Traefik for this container
      - "traefik.enable=true"
      # Match incoming requests on a specific hostname
      - "traefik.http.routers.xwiki.rule=Host(`${XWIKI_HOSTNAME}`)"
      # Assign the router to a named Traefik service
      - "traefik.http.routers.xwiki.service=xwiki"
      # Use the 'websecure' (HTTPS) entry point
      - "traefik.http.routers.xwiki.entrypoints=websecure"
      # Define the internal container port for routing
      - "traefik.http.services.xwiki.loadbalancer.server.port=8080"
      # Enable TLS on this router
      - "traefik.http.routers.xwiki.tls=true"
      # Use Let's Encrypt for certificate management
      - "traefik.http.routers.xwiki.tls.certresolver=letsencrypt"
      # Pass the original Host header to the container
      - "traefik.http.services.xwiki.loadbalancer.passhostheader=true"
      # Apply a compression middleware
      - "traefik.http.routers.xwiki.middlewares=compresstraefik"
      # Define settings for the compression middleware
      - "traefik.http.middlewares.compresstraefik.compress=true"
      # Specify which Docker network Traefik should use for routing
      - "traefik.docker.network=traefik-network"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      traefik:
        condition: service_healthy

  traefik:
    image: ${TRAEFIK_IMAGE_TAG}
    command:
      # Set the log level (DEBUG, INFO, WARN, ERROR)
      - "--log.level=${TRAEFIK_LOG_LEVEL}"
      # Enable the built-in API and web-based dashboard
      - "--api.dashboard=true"
      # Enable the /ping endpoint so we can health-check Traefik
      - "--ping=true"
      # Assign the /ping endpoint to a dedicated entry point on port 8082
      - "--ping.entrypoint=ping"
      - "--entrypoints.ping.address=:8082"
      # Define the primary HTTP entry point on port 80
      - "--entrypoints.web.address=:80"
      # Define the secure (HTTPS) entry point on port 443
      - "--entrypoints.websecure.address=:443"
      # HTTP -> HTTPS redirect at entrypoint level
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Enable the Docker provider to detect containers and their labels
      - "--providers.docker=true"
      # Point Traefik to the Docker socket
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      # Prevent automatic exposure of all containers; only expose containers
      # with "traefik.enable=true"
      - "--providers.docker.exposedbydefault=false"
      # Use ACME (Let's Encrypt) to generate/renew certificates via TLS challenge
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      # The email address used by Let's Encrypt for renewal notices
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}"
      # The file where ACME certificates are stored inside the container
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json"
      # Enable Prometheus metrics
      - "--metrics.prometheus=true"
      # Configure Prometheus histogram buckets
      - "--metrics.prometheus.buckets=0.1,0.3,1.2,5.0"
      # Check for newer Traefik versions and optionally log that info
      - "--global.checknewversion=true"
      # Disable sending anonymous usage data to the Traefik maintainers
      - "--global.sendanonymoususage=false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/etc/traefik/acme
    networks:
      - traefik-network
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "http://localhost:8082/ping","--spider"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      # Enable Traefik for this container
      - "traefik.enable=true"
      # A router to expose the Traefik dashboard
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_HOSTNAME}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      # Basic Authentication for the Traefik dashboard
      - "traefik.http.routers.dashboard.middlewares=authtraefik"
      - "traefik.http.middlewares.authtraefik.basicauth.users=${TRAEFIK_BASIC_AUTH}"
      # Specify the internal server port to the dashboard service
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
      # Pass the original Host header to the backend
      - "traefik.http.services.dashboard.loadbalancer.passhostheader=true"
    restart: unless-stopped

  backups:
    user: "0:0"
    image: ${XWIKI_BACKUP_IMAGE_TAG}
    build:
      context: ./docker/backups
      args:
        POSTGRES_BASE_IMAGE: ${XWIKI_POSTGRES_IMAGE_TAG}
    command: sh /scripts/xwiki-backup-runner.sh
    volumes:
      - xwiki-data:${DATA_PATH}
      - xwiki-backups:${XWIKI_BACKUPS_PATH}
      - ./scripts:/scripts:ro
    environment:
      XWIKI_DB_NAME: ${XWIKI_DB_NAME}
      XWIKI_DB_USER: ${XWIKI_DB_USER}
      PGPASSWORD: ${XWIKI_DB_PASSWORD}
      BACKUP_INIT_SLEEP: ${BACKUP_INIT_SLEEP}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL}
      BACKUP_PRUNE_DAYS: ${BACKUP_PRUNE_DAYS}
      XWIKI_BACKUPS_PATH: ${XWIKI_BACKUPS_PATH}
      XWIKI_BACKUP_NAME: ${XWIKI_BACKUP_NAME}
      DATA_PATH: ${DATA_PATH}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_PREFIX: ${S3_PREFIX:-}
    networks:
      - xwiki-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy